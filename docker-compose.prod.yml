version: "3.8"

services:
  backend:
    image: crpi-y4308sxmzzv810gc.cn-qingdao.personal.cr.aliyuncs.com/primusse/codeflash-backend:latest
    container_name: codeflash-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/app/data/codeflash.db
      - DATA_DIR=/app/data
      - GIN_MODE=release
    volumes:
      - codeflash_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - codeflash-net

  frontend:
    image: crpi-y4308sxmzzv810gc.cn-qingdao.personal.cr.aliyuncs.com/primusse/codeflash-frontend:latest
    container_name: codeflash-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codeflash-net

volumes:
  codeflash_data:
    driver: local

networks:
  codeflash-net:
    driver: bridge
